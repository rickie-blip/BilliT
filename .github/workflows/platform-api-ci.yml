name: Platform API CI

on:
  push:
    paths:
      - 'platform/api/**'
      - '.github/workflows/platform-api-ci.yml'
  pull_request:
    paths:
      - 'platform/api/**'
      - '.github/workflows/platform-api-ci.yml'

jobs:
  build-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: platform/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: billit
          POSTGRES_PASSWORD: billit
          POSTGRES_DB: billit
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U billit"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      redis:
        image: redis:7
        ports:
          - 6379:6379

    env:
      DATABASE_URL: postgresql://billit:billit@localhost:5432/billit?schema=public
      REDIS_HOST: 127.0.0.1
      REDIS_PORT: 6379
      JWT_ACCESS_SECRET: ci-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: platform/api/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test
