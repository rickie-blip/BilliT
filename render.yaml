services:
  - type: web
    name: billit
    runtime: node
    rootDir: backend
    buildCommand: cd ../Billit-Dashboard && npm install && npm run build && cd ../backend && npm install
    startCommand: node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: RATE_LIMIT_WINDOW_MS
        value: 60000
      - key: RATE_LIMIT_MAX
        value: 120
      - key: MPESA_ENVIRONMENT
        value: production
      - key: MPESA_CONSUMER_KEY
        value: ""
      - key: MPESA_CONSUMER_SECRET
        value: ""
      - key: MPESA_SHORTCODE
        value: ""
      - key: MPESA_PASSKEY
        value: ""
      - key: MPESA_CALLBACK_URL
        value: ""
    disk:
      name: billit-data
      mountPath: /data
      sizeGB: 1
